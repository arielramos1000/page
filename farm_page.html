<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="imagens/logo5.png">
    <title>Talhão.ai | Inteligência no seu talhão </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#2b664f',
              700: '#2b664f',
              800: '#2b664f',
              900: '#14532d'
            }
          },
          fontFamily: {
            sans: ['Space Grotesk']
          },
          boxShadow: {
            soft: '0 20px 60px rgba(15, 23, 42, 0.06)'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --brand-50: #f0fdf4;
      --brand-100: #dcfce7;
      --brand-200: #bbf7d0;
      --brand-400: #4ade80;
      --brand-500: #22c55e;
      --brand-600: #2b664f;
      --brand-700: #2b664f;
      --brand-800: #2b664f;
      --brand-900: #14532d;
      --ink-900: #0f172a;
      --surface: #ffffff;
      --surface-2: #f3f4f6;
      --border: #e6ecf3;
      --shadow-soft: 0 20px 60px rgba(15, 23, 42, 0.06);
      --panel-bg: linear-gradient(180deg, #f5f5f6 0%, #ededf0 100%);
      --panel-border: #e4e7eb;
      --panel-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 1px 2px rgba(15, 23, 42, 0.06), 0 8px 18px rgba(15, 23, 42, 0.04);
      --brand-text-highlight: #2b664f;
      --ambient-green-a: rgba(106, 164, 134, 0.22);
      --ambient-green-b: rgba(127, 186, 155, 0.14);
      --ambient-green-c: rgba(169, 214, 188, 0.10);
      --ambient-float-distance: 4px;
      --ambient-float-duration-base: 11s;
      --ambient-blur: 44px;
    }

    html, body, #root {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      font-family: 'Space Grotesk';
      background: linear-gradient(180deg, #f3f4f6 0%, #f4f5f7 100%);
      color: var(--ink-900);
      letter-spacing: -0.01em;
    }

    .layout-zoom-shell {
      width: 100%;
    }

    @media (min-width: 1280px) {
      .layout-zoom-shell {
        zoom: 0.9;
      }
    }

    .font-mono {
      font-family: 'Space Grotesk';
    }

    /* Calibracao de pesos para usar apenas Space Grotesk com hierarquia consistente */
    .font-light {
      font-weight: 400 !important;
    }

    .font-normal {
      font-weight: 400 !important;
    }

    .font-medium {
      font-weight: 500 !important;
    }

    .font-semibold {
      font-weight: 600 !important;
    }

    .font-bold {
      font-weight: 600 !important;
    }

    .font-extrabold,
    .font-black {
      font-weight: 700 !important;
    }

    ::selection { background: var(--brand-100); }

    .glass-header {
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.05);
    }

    .card-surface {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      box-shadow: var(--panel-shadow);
    }

    .ambient-section {
      position: relative;
      isolation: isolate;
      z-index: 0;
    }

    .ambient-section::before,
    .ambient-section::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    .ambient-section--default::before {
      inset: -7% -3%;
      background:
        radial-gradient(62% 44% at 20% 24%, var(--ambient-green-a) 0%, transparent 74%),
        radial-gradient(66% 50% at 82% 74%, var(--ambient-green-b) 0%, transparent 76%);
      filter: blur(var(--ambient-blur));
      opacity: 0.92;
      animation: ambient-glow-drift calc(var(--ambient-float-duration-base) + 2s) ease-in-out infinite alternate;
    }

    .ambient-section--default::after {
      inset: 0;
      background: linear-gradient(180deg, rgba(231, 242, 236, 0.42) 0%, rgba(231, 242, 236, 0.12) 44%, rgba(231, 242, 236, 0.28) 100%);
      border-radius: inherit;
      opacity: 0.72;
    }

    .ambient-section--default {
      background: linear-gradient(180deg, rgba(236, 246, 240, 0.42) 0%, rgba(236, 246, 240, 0.16) 48%, rgba(236, 246, 240, 0.34) 100%);
    }

    .ambient-section--uniform-green {
      background: #eaf4ee;
    }

    .ambient-section--uniform-green::before {
      inset: -7% -3%;
      background:
        radial-gradient(62% 44% at 20% 24%, rgba(106, 164, 134, 0.16) 0%, transparent 74%),
        radial-gradient(66% 50% at 82% 74%, rgba(127, 186, 155, 0.12) 0%, transparent 76%);
      filter: blur(var(--ambient-blur));
      opacity: 0.82;
      animation: ambient-glow-drift calc(var(--ambient-float-duration-base) + 2s) ease-in-out infinite alternate;
    }

    .ambient-section--uniform-green::after {
      inset: 0;
      background: none;
      opacity: 0;
    }

    .ambient-section--harmonized::before {
      inset: -5% -2%;
      background:
        radial-gradient(60% 42% at 16% 22%, rgba(116, 179, 145, 0.17) 0%, transparent 74%),
        radial-gradient(58% 42% at 84% 74%, rgba(121, 184, 151, 0.12) 0%, transparent 76%);
      filter: blur(calc(var(--ambient-blur) * 0.85));
      opacity: 0.68;
      animation: ambient-glow-drift calc(var(--ambient-float-duration-base) + 3s) ease-in-out infinite alternate;
    }

    .ambient-section--harmonized::after {
      inset: 0;
      background: linear-gradient(180deg, rgba(229, 241, 234, 0.24) 0%, rgba(229, 241, 234, 0.02) 52%, rgba(229, 241, 234, 0.16) 100%);
      border-radius: inherit;
      opacity: 0.78;
    }

    .ambient-section--harmonized {
      background: linear-gradient(180deg, rgba(232, 243, 236, 0.22) 0%, rgba(232, 243, 236, 0.06) 52%, rgba(232, 243, 236, 0.18) 100%);
    }

    .ambient-section--ticker::before {
      inset: -24px 0;
      background:
        radial-gradient(42% 140% at 22% 50%, rgba(118, 177, 145, 0.18) 0%, transparent 78%),
        radial-gradient(42% 140% at 78% 50%, rgba(118, 177, 145, 0.16) 0%, transparent 78%);
      filter: blur(calc(var(--ambient-blur) * 0.62));
      opacity: 0.82;
      animation: ambient-glow-drift calc(var(--ambient-float-duration-base) + 4s) ease-in-out infinite alternate;
    }

    .ambient-section--ticker::after {
      inset: 0;
      background: linear-gradient(90deg, rgba(236, 246, 240, 0.18) 0%, rgba(236, 246, 240, 0.36) 50%, rgba(236, 246, 240, 0.18) 100%);
      opacity: 0.72;
    }

    .ambient-section--ticker {
      background: linear-gradient(90deg, rgba(236, 246, 240, 0.16) 0%, rgba(236, 246, 240, 0.32) 50%, rgba(236, 246, 240, 0.16) 100%);
    }

    .ambient-content {
      position: relative;
      z-index: 1;
    }

    .ambient-main-box {
      position: relative;
      isolation: isolate;
      z-index: 0;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 1px 2px rgba(15, 23, 42, 0.06),
        0 14px 30px rgba(45, 121, 87, 0.12),
        0 26px 46px rgba(127, 186, 155, 0.09);
    }

    .ambient-main-box::before {
      content: "";
      position: absolute;
      inset: -12px -10px;
      border-radius: inherit;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(68% 44% at 24% 20%, var(--ambient-green-a) 0%, transparent 76%),
        radial-gradient(68% 48% at 78% 84%, var(--ambient-green-b) 0%, transparent 78%);
      filter: blur(calc(var(--ambient-blur) * 0.72));
      opacity: 0.78;
      animation: ambient-glow-drift calc(var(--ambient-float-duration-base) + 2s) ease-in-out infinite alternate;
    }

    .ambient-float {
      animation: ambient-float-y var(--ambient-float-duration-base) ease-in-out infinite alternate;
      will-change: transform;
    }

    .ambient-float--slow {
      animation-duration: calc(var(--ambient-float-duration-base) + 2s);
    }

    .ambient-float--fast {
      animation-duration: calc(var(--ambient-float-duration-base) - 1.5s);
    }

    /* Cor unica para textos de destaque em verde (identica ao guia visual) */
    .text-brand-500,
    .text-brand-600,
    .text-brand-700,
    .text-brand-800,
    .text-brand-900 {
      color: var(--brand-text-highlight) !important;
    }

    .hover\:text-brand-500:hover,
    .hover\:text-brand-600:hover,
    .hover\:text-brand-700:hover,
    .hover\:text-brand-800:hover,
    .hover\:text-brand-900:hover,
    .focus-visible\:text-brand-500:focus-visible,
    .focus-visible\:text-brand-600:focus-visible,
    .focus-visible\:text-brand-700:focus-visible,
    .focus-visible\:text-brand-800:focus-visible,
    .focus-visible\:text-brand-900:focus-visible,
    .active\:text-brand-500:active,
    .active\:text-brand-600:active,
    .active\:text-brand-700:active,
    .active\:text-brand-800:active,
    .active\:text-brand-900:active {
      color: var(--brand-text-highlight) !important;
    }

    .group:hover .group-hover\:text-brand-500,
    .group:hover .group-hover\:text-brand-600,
    .group:hover .group-hover\:text-brand-700,
    .group:hover .group-hover\:text-brand-800,
    .group:hover .group-hover\:text-brand-900 {
      color: var(--brand-text-highlight) !important;
    }

    .aptidao-score-card:hover {
      border-color: #bbf7d0 !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 1px 2px rgba(15, 23, 42, 0.06), 0 10px 22px rgba(21, 128, 61, 0.16) !important;
    }

    .aptidao-pill-neutral {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid #d7dce2;
      background: linear-gradient(180deg, #f4f5f7 0%, #e7e9ed 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92), 0 4px 12px rgba(15, 23, 42, 0.12);
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .aptidao-pill-neutral-icon {
      width: 16px;
      height: 16px;
      color: #6b7280;
      flex-shrink: 0;
    }

    .market-glass-panel {
      background: rgba(255, 255, 255, 0.56) !important;
      border: 1px solid rgba(255, 255, 255, 0.68) !important;
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.17);
    }

    .market-glass-stat {
      background: rgba(255, 255, 255, 0.48) !important;
      border-color: rgba(223, 232, 242, 0.78) !important;
      backdrop-filter: blur(11px) saturate(118%);
      -webkit-backdrop-filter: blur(11px) saturate(118%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78), 0 12px 28px rgba(15, 23, 42, 0.14);
    }

    .stat-card-hover-green {
      background: linear-gradient(180deg, #f3f4f6 0%, #f4f5f7 100%) !important;
      transform: translateY(0);
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
      transition-property: transform, border-color, box-shadow;
      will-change: transform, box-shadow, border-color;
    }

    :where(div, section, aside, article)[class*="rounded"][class*="border"][class*="bg-white"]:not(.stat-card-hover-green),
    :where(div, section, aside, article)[class*="rounded"][class*="border"][class*="bg-slate-100"]:not(.stat-card-hover-green),
    :where(div, section, aside, article)[class*="rounded"][class*="border"][class*="bg-slate-50"]:not(.stat-card-hover-green),
    :where(div, section, aside, article)[class*="rounded"][class*="border"][class*="bg-brand-50"]:not(.stat-card-hover-green) {
      background: var(--panel-bg) !important;
      border-color: var(--panel-border) !important;
      box-shadow: var(--panel-shadow) !important;
    }

    /* Mesmo hover do card de aptidão: borda + sombra verde */
    .stat-card-hover-green.rounded-2xl.border:hover {
      transform: translateY(-2px);
      border-color: #bbf7d0 !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.86), 0 1px 2px rgba(15, 23, 42, 0.06), 0 10px 22px rgba(21, 128, 61, 0.16) !important;
    }

    input, select, textarea {
      font-family: inherit;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f9fbff;
      transition: all 0.15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand-700);
      box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.12);
      background: #ffffff;
      outline: none;
    }

    button:focus-visible {
      outline: 2px solid var(--brand-600);
      outline-offset: 2px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .animate-bounce {
      animation: bounce 2s infinite;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .market-tape-stage {
      --tape-gutter: 1rem;
      --tape-fade: 56px;
      --tape-mask-bg: #f4f5f7;
    }

    @media (min-width: 640px) {
      .market-tape-stage {
        --tape-gutter: 1.5rem;
        --tape-fade: 72px;
      }
    }

    @media (min-width: 1280px) {
      .market-tape-stage {
        --tape-gutter: 10rem;
        --tape-fade: 88px;
      }
    }

    .market-tape-edge {
      position: absolute;
      top: 0;
      bottom: 0;
      z-index: 10;
      pointer-events: none;
      width: calc(var(--tape-gutter) + var(--tape-fade));
    }

    .market-tape-edge--left {
      left: 0;
      background: linear-gradient(
        to right,
        var(--tape-mask-bg) 0,
        var(--tape-mask-bg) var(--tape-gutter),
        rgba(244, 245, 247, 0.92) calc(var(--tape-gutter) + (var(--tape-fade) * 0.55)),
        rgba(244, 245, 247, 0) calc(var(--tape-gutter) + var(--tape-fade))
      );
    }

    .market-tape-edge--right {
      right: 0;
      background: linear-gradient(
        to left,
        var(--tape-mask-bg) 0,
        var(--tape-mask-bg) var(--tape-gutter),
        rgba(244, 245, 247, 0.92) calc(var(--tape-gutter) + (var(--tape-fade) * 0.55)),
        rgba(244, 245, 247, 0) calc(var(--tape-gutter) + var(--tape-fade))
      );
    }

    .chat-mist-green-section {
      background: linear-gradient(180deg, #f3f5f4 0%, #eef3f0 52%, #f2f5f3 100%);
      position: relative;
      overflow: hidden;
    }

    .chat-mist-green-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(980px 420px at 50% 34%, rgba(27, 95, 71, 0.25) 0%, rgba(27, 95, 71, 0.14) 38%, rgba(27, 95, 71, 0.05) 58%, transparent 78%),
        radial-gradient(860px 340px at 50% 74%, rgba(33, 111, 83, 0.18) 0%, rgba(33, 111, 83, 0.08) 44%, transparent 76%),
        radial-gradient(520px 230px at 50% 50%, rgba(64, 142, 108, 0.13) 0%, rgba(64, 142, 108, 0.05) 52%, transparent 82%);
    }

    .chat-mist-green-soften {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(600px 240px at 50% 36%, rgba(255, 255, 255, 0.34) 0%, rgba(255, 255, 255, 0.14) 50%, rgba(255, 255, 255, 0) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.28) 0%, rgba(255, 255, 255, 0.09) 44%, rgba(255, 255, 255, 0.20) 100%);
    }

    .chat-mist-green-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: none;
      opacity: 0;
    }

    .chat-mist-green-transition-top,
    .chat-mist-green-transition-bottom {
      position: absolute;
      left: 0;
      right: 0;
      height: 88px;
      pointer-events: none;
      z-index: 6;
    }

    .chat-mist-green-transition-top {
      top: 0;
      background: linear-gradient(180deg, #f3f4f6 0%, rgba(243, 244, 246, 0.82) 42%, rgba(243, 244, 246, 0) 100%);
    }

    .chat-mist-green-transition-bottom {
      bottom: 0;
      background: linear-gradient(0deg, #f4f5f7 0%, rgba(244, 245, 247, 0.82) 42%, rgba(244, 245, 247, 0) 100%);
    }

    .ready-start-section {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #edf5f0 0%, #e2efe7 56%, #d7e8de 100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease, filter 0.35s ease;
      will-change: transform, box-shadow;
    }

    .ready-start-section::after {
      content: "";
      position: absolute;
      inset: -10% -5% -14% -5%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      transform: translate3d(0, 8px, 0) scale(0.985);
      background: radial-gradient(
        52% 42% at 74% 58%,
        rgba(84, 162, 124, 0.30) 0%,
        rgba(84, 162, 124, 0.16) 38%,
        rgba(84, 162, 124, 0) 76%
      );
      transition: opacity 0.35s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ready-start-section:hover {
      transform: translateY(-3px);
      box-shadow:
        0 28px 58px rgba(15, 23, 42, 0.17),
        0 16px 40px rgba(43, 102, 79, 0.24),
        0 0 0 1px rgba(102, 171, 137, 0.34);
    }

    .ready-start-section:hover::after {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      animation: ready-start-hover-pulse 2.8s ease-in-out infinite;
    }

    .ready-start-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(520px 260px at 22% 26%, rgba(207, 236, 221, 0.72) 0%, rgba(207, 236, 221, 0.28) 44%, transparent 78%),
        radial-gradient(420px 260px at 68% 68%, rgba(171, 212, 189, 0.46) 0%, rgba(171, 212, 189, 0.18) 46%, transparent 80%),
        radial-gradient(380px 220px at 86% 26%, rgba(196, 229, 210, 0.44) 0%, rgba(196, 229, 210, 0.16) 46%, transparent 78%);
      background-size: 120% 120%, 112% 112%, 116% 116%;
      background-position: 20% 24%, 68% 68%, 84% 24%;
      background-repeat: no-repeat;
      animation: ready-start-glow-flow 14s ease-in-out infinite alternate;
      will-change: background-position;
    }

    .ready-start-bottom-haze {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(100px 180px at 42% 100%, rgba(112, 170, 139, 0.30) 0%, rgba(112, 170, 139, 0.12) 42%, transparent 78%),
        radial-gradient(100px 180px at 58% 100%, rgba(106, 164, 134, 0.28) 0%, rgba(106, 164, 134, 0.10) 42%, transparent 80%),
        radial-gradient(140px 180px at 88% 100%, rgba(119, 177, 146, 0.24) 0%, rgba(119, 177, 146, 0.08) 42%, transparent 80%);
      background-size: 116% 116%, 116% 116%, 120% 120%;
      background-position: 44% 100%, 58% 100%, 86% 100%;
      background-repeat: no-repeat;
      animation: ready-start-haze-flow 11s ease-in-out infinite alternate;
      will-change: background-position;
    }

    .ready-start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 168px;
      height: 52px;
      border-radius: 14px;
      padding: 0 26px;
      border: 1px solid #1f5a43;
      background: linear-gradient(180deg, #2b664f 0%, #1f5a43 100%);
      color: #f8fffb;
      font-size: 18px;
      font-weight: 600;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2), 0 12px 28px rgba(31, 90, 67, 0.24);
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .ready-start-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.26), 0 14px 30px rgba(31, 90, 67, 0.3);
    }

    .broker-social-icon {
      display: inline-flex;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      border: 1px solid #1f5a43;
      background: linear-gradient(180deg, #2b664f 0%, #1f5a43 100%);
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 8px 18px rgba(31, 90, 67, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, filter 0.2s ease;
    }

    .broker-social-icon:hover {
      transform: translateY(-2px);
      border-color: #86efac;
      filter: brightness(1.05);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 0 0 4px rgba(134, 239, 172, 0.24), 0 12px 26px rgba(74, 222, 128, 0.38);
    }

    .journey-tech-section {
      position: relative;
      border-radius: 32px;

            ),
            h('div', { className: "absolute bottom-4 left-1/2 -translate-x-1/2 max-w-[calc(100%-1rem)] overflow-x-auto whitespace-nowrap flex items-center gap-1 p-1 bg-slate-900/40 backdrop-blur-md rounded-xl border border-white/20" },
              h('button', {
                key: 'full-video',
                onClick: () => setViewMode('video'),
                className: `px-3 sm:px-4 py-2 rounded-lg text-[10px] font-black transition-all uppercase tracking-wider ${
                  viewMode === 'video' ? 'bg-white text-slate-900 shadow-lg' : 'text-white hover:bg-white/10'
                }`
              }, "vídeo"),
              h('button', {
                key: 'full-fotos',
                onClick: () => setViewMode('photos'),
                className: `px-3 sm:px-4 py-2 rounded-lg text-[10px] font-black transition-all uppercase tracking-wider ${
                  viewMode === 'photos' ? 'bg-white text-slate-900 shadow-lg' : 'text-white hover:bg-white/10'
                }`
              }, "fotos"),
              Object.keys(layers).map((id) =>
                h('button', {
                  key: `full-${id}`,
                  onClick: () => {
                    setViewMode('map');
                    setActiveLayer(id);
                  },
                  className: `px-3 sm:px-4 py-2 rounded-lg text-[10px] font-black transition-all uppercase tracking-wider ${
                    viewMode === 'map' && activeLayer === id ? 'bg-white text-slate-900 shadow-lg' : 'text-white hover:bg-white/10'
                  }`
                }, id)
              )
            ),
            h('button', {
              onClick: () => setFullscreen(false),
              className: "absolute top-4 right-4 p-3 bg-white/20 hover:bg-white/40 backdrop-blur rounded-full text-white transition-all z-10"
            },
              h(X, { className: "w-6 h-6" })
            )
          )
        ),

        // Modal de Captura (estilo chat.html)
        showUpgradeModal && h('div', {
          className: "fixed inset-0 z-[130] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md",
          onClick: closeLeadCaptureModal
        },
          h('div', {
            className: "w-full max-w-xl rounded-3xl border border-slate-200 bg-white/90 backdrop-blur-xl shadow-2xl p-8 md:p-10 relative animate-in fade-in zoom-in duration-200",
            onClick: (e) => e.stopPropagation(),
            role: "dialog",
            'aria-modal': "true",
            'aria-labelledby': "lead-modal-title",
            'aria-describedby': "lead-modal-desc"
          },
            h('button', {
              onClick: closeLeadCaptureModal,
              className: "absolute top-4 right-4 text-slate-500 hover:text-slate-900 transition",
              'aria-label': "Fechar"
            },
              h(X, { className: "w-5 h-5" })
            ),
            h('h3', { id: "lead-modal-title", className: "text-3xl font-bold text-slate-900" }, "Quero acessar o relatório"),
            h('p', { id: "lead-modal-desc", className: "text-slate-600 mt-2" }, "Preencha seus dados para que você recebe o relatório desta propriedade"),
            h('div', { className: "mt-5 rounded-2xl border border-brand-100 bg-brand-50/80 p-4" },
              leadDownloadReady
                ? h('div', { className: "space-y-3" },
                    h('p', { className: "text-sm leading-relaxed text-brand-900 font-semibold" }, "Dados validados com sucesso. O relatório está disponível para download:"),
                    h('button', {
                      type: "button",
                      onClick: downloadReportPdf,
                      className: "inline-flex items-center gap-2 rounded-xl bg-brand-700 px-4 py-2 text-xs font-black uppercase tracking-widest text-white hover:bg-brand-800 transition-colors"
                    },
                      "Baixar relatório PDF ",
                      h(ChevronRight, { className: "w-4 h-4" })
                    )
                  )
                : h('p', { className: "text-sm leading-relaxed text-slate-700" }, "Preencha seus dados para acessar o relatório completo desta propriedade")
            ),
            h('form', {
              className: "mt-6 grid gap-4",
              onSubmit: async (e) => {
                e.preventDefault();
                const normalized = {
                  nome: leadForm.nome.trim(),
                  whatsapp: leadForm.whatsapp.trim(),
                  cidade: leadForm.cidade.trim(),
                  estado: leadForm.estado.trim()
                };
                const whatsappDigits = normalized.whatsapp.replace(/\D/g, '');

                if (!normalized.nome || !normalized.whatsapp || !normalized.cidade || !normalized.estado) {
                  setLeadFormError('Preencha todos os campos para liberar o relatório.');
                  setLeadDownloadReady(false);
                  return;
                }

                if (whatsappDigits.length < 10) {
                  setLeadFormError('Informe um WhatsApp válido para continuar.');
                  setLeadDownloadReady(false);
                  return;
                }

                setLeadFormError('');
                setLeadFormSubmitting(true);
                try {
                  await submitFarmLead({
                    formType: 'report_download',
                    nome: normalized.nome,
                    telefone: normalized.whatsapp,
                    cidade: normalized.cidade,
                    estado: normalized.estado
                  });
                  setLeadDownloadReady(true);
                } catch (error) {
                  setLeadDownloadReady(false);
                  setLeadFormError(getLeadErrorMessage(error));
                } finally {
                  setLeadFormSubmitting(false);
                }
              }
            },
              h('label', { className: "text-sm font-semibold text-slate-700" },
                "Nome",
                h('input', {
                  type: "text",
                  name: "nome",
                  required: true,
                  value: leadForm.nome,
                  onChange: (e) => setLeadForm((prev) => ({ ...prev, nome: e.target.value })),
                  className: "mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-base text-slate-900 focus:border-brand-700 focus:ring-4 focus:ring-brand-700/15 outline-none",
                  placeholder: "Seu nome"
                })
              ),
              h('label', { className: "text-sm font-semibold text-slate-700" },
                "Whatsapp",
                h('input', {
                  type: "tel",
                  name: "whatsapp",
                  required: true,
                  value: leadForm.whatsapp,
                  onChange: (e) => setLeadForm((prev) => ({ ...prev, whatsapp: e.target.value })),
                  className: "mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-base text-slate-900 focus:border-brand-700 focus:ring-4 focus:ring-brand-700/15 outline-none",
                  placeholder: "(00) 00000-0000"
                })
              ),
              h('div', { className: "grid gap-4 md:grid-cols-2" },
                h('label', { className: "text-sm font-semibold text-slate-700" },
                  "Cidade",
                  h('input', {
                    type: "text",
                    name: "cidade",
                    required: true,
                    value: leadForm.cidade,
                    onChange: (e) => setLeadForm((prev) => ({ ...prev, cidade: e.target.value })),
                    className: "mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-base text-slate-900 focus:border-brand-700 focus:ring-4 focus:ring-brand-700/15 outline-none",
                    placeholder: "Sua cidade"
                  })
                ),
                h('label', { className: "text-sm font-semibold text-slate-700" },
                  "Estado",
                  h('input', {
                    type: "text",
                    name: "estado",
                    required: true,
                    value: leadForm.estado,
                    onChange: (e) => setLeadForm((prev) => ({ ...prev, estado: e.target.value })),
                    className: "mt-2 w-full rounded-2xl border border-slate-200 bg-white/80 px-4 py-3 text-base text-slate-900 focus:border-brand-700 focus:ring-4 focus:ring-brand-700/15 outline-none",
                    placeholder: "UF"
                  })
                )
              ),
              h('button', {
                type: "submit",
                disabled: leadFormSubmitting,
                className: "mt-2 w-full rounded-2xl py-3 text-base font-semibold bg-gradient-to-r from-slate-900 to-brand-800 text-white border border-slate-900 shadow-lg hover:brightness-110 transition-all disabled:opacity-60 disabled:cursor-not-allowed"
              }, leadFormSubmitting ? "Enviando..." : "Baixar relatório"),
              leadFormError && h('p', { className: "text-sm text-rose-600 font-semibold" }, leadFormError)
            )
          )
        )
      );
    }

    // Renderizar a aplicação
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
